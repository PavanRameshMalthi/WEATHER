<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Weather App</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div id="animation-layer"></div>

    <div class="container">

        <div class="top-bar">

            <div class="datetime">
                <h3 id="date">Date</h3>
                <p id="time">Time</p>
            </div>

            <button id="themeToggle">
                🌙 Theme
            </button>

        </div>

        <div class="card">

            <div class="search">

                <input
                    type="text"
                    placeholder="Enter city name..."
                    id="cityInput">

                <button id="searchBtn">
                    <i class="fa fa-search"></i>
                </button>

            </div>

            <div class="location-section">

                <button id="locationBtn">
                    📍 Use My Location
                </button>

            </div>

            <div class="history-section">

                <label>
                    Recent Searches
                </label>

                <select id="historySelect">
                    <option value="">
                        Select Previous Search
                    </option>
                </select>

            </div>

            <div class="loading">

                <div class="spinner"></div>
                <p>Loading weather...</p>

            </div>

            <div class="error">

                <p>
                    City not found. Please try again.
                </p>

            </div>

            <div class="alerts"></div>

            <div class="weather">

                <img
                    src="images/clear.png"
                    class="weather-icon"
                    alt="Weather">

                <h1 class="temp">--°C</h1>

                <h2 class="city">
                    Search a city
                </h2>

                <p class="country"></p>

                <p class="description"></p>

                <div class="extra-info">

                    <div class="info-box">
                        <span>Feels Like</span>
                        <strong class="feels-like">
                            --
                        </strong>
                    </div>

                    <div class="info-box">
                        <span>Pressure</span>
                        <strong class="pressure">
                            --
                        </strong>
                    </div>

                </div>

                <div class="sun-times">

                    <div>
                        🌅 Sunrise:
                        <span class="sunrise">
                            --
                        </span>
                    </div>

                    <div>
                        🌇 Sunset:
                        <span class="sunset">
                            --
                        </span>
                    </div>

                </div>

                <div class="details">

                    <div class="col">

                        <img
                            src="images/humidity.png"
                            alt="Humidity">

                        <div>

                            <p class="humidity">
                                --
                            </p>

                            <p>
                                Humidity
                            </p>

                        </div>

                    </div>

                    <div class="col">

                        <img
                            src="images/wind.png"
                            alt="Wind">

                        <div>

                            <p class="wind">
                                --
                            </p>

                            <p>
                                Wind Speed
                            </p>

                        </div>

                    </div>

                </div>

            </div>

            <div class="forecast-section">

                <h3>
                    5-Day Forecast
                </h3>

                <div
                    class="forecast-container"
                    id="forecastContainer">

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
